<div class="modal-backdrop" (click)="triggerClose()" role="presentation">
  <div class="modal-content" (click)="$event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    
    <!-- Modal Title -->
    <h3 id="modalTitle" class="modal-title">Add New Board</h3>

    <!-- Board Name Form Group -->
    <div class="form-group">
      <label class="form-label" for="boardNameInput">Board Name</label>
      <div class="input-container">
        <input 
          type="text" 
          id="boardNameInput"
          #boardInput
          placeholder="e.g. Platform Launch" 
          [value]="boardName()"
          (input)="onNameInput(boardInput.value)"
          [class.input-error]="showErrors() && boardName().trim() === ''"
        />
        @if (showErrors() && boardName().trim() === '') {
          <span class="error-msg">Can't be empty</span>
        }
      </div>
    </div>

    <!-- Board Columns Form Group -->
    <div class="form-group">
      <label class="form-label">Board Columns</label>
      
      <div class="columns-builder-list">
        @for (col of columns(); track $index; let index = $index) {
          <div class="column-input-row">
            
            <!-- Column Accent Color Picker -->
            <div class="color-dot-container" [style.background-color]="col.color" title="Choose column color accent">
              <input 
                type="color" 
                class="hidden-color-input"
                #colorPicker
                [value]="col.color"
                (input)="updateColumnColor(index, colorPicker.value)"
              />
            </div>

            <!-- Column Name Input -->
            <div class="input-container flex-grow">
              <input 
                type="text" 
                #colInput
                placeholder="e.g. Todo" 
                [value]="col.name"
                (input)="updateColumnName(index, colInput.value)"
                [class.input-error]="showErrors() && col.name.trim() === ''"
              />
              @if (showErrors() && col.name.trim() === '') {
                <span class="error-msg">Can't be empty</span>
              }
            </div>

            <!-- Remove Row Action Button -->
            <button 
              class="remove-col-btn" 
              (click)="removeColumn(index)" 
              aria-label="Remove column row"
            >
              <img src="icons/icon-cross.svg" alt="Remove" />
            </button>

          </div>
        }
      </div>

      <!-- Add New Column Row Primary Action -->
      <button 
        class="btn btn-secondary add-col-btn" 
        (click)="addColumn()"
        aria-label="Add new column row"
      >
        + Add New Column
      </button>
    </div>

    <!-- Submit Board Creation CTA -->
    <button 
      class="btn btn-primary submit-board-btn" 
      (click)="triggerSubmit()"
      aria-label="Create new board"
    >
      Create New Board
    </button>

  </div>
</div>
